<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advance IT - Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0b0f19;
            color: #e2e8f0;
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen">

    <nav class="border-b border-gray-800 bg-gray-900/50 backdrop-blur px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="bg-cyan-500 text-gray-900 p-2 rounded-lg font-bold tracking-wider text-sm shadow-[0_0_15px_rgba(6,182,212,0.5)]">
                A I
            </div>
            <span class="text-xl font-semibold tracking-wide bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">Advance IT Admin</span>
        </div>
        <div id="syncStatus" class="flex items-center space-x-2 bg-gray-800/80 px-4 py-2 rounded-full border border-gray-700 text-sm">
            <span class="relative flex h-2 w-2">
                <span id="statusDotPulse" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                <span id="statusDot" class="relative inline-flex rounded-full h-2 w-2 bg-yellow-500"></span>
            </span>
            <span id="statusText" class="text-gray-300 font-medium">Connecting Database...</span>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <section class="bg-gray-900/40 border border-gray-800 rounded-2xl p-6 backdrop-blur-md shadow-xl">
            <div class="flex items-center space-x-3 mb-6">
                <i class="fa-solid fa-sliders text-cyan-400 text-xl"></i>
                <h2 class="text-lg font-medium text-white">App Configurations</h2>
            </div>
            <form id="settingsForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Slider Image 1 URL</label>
                    <input type="url" id="slider1" required class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-cyan-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Slider Image 2 URL</label>
                    <input type="url" id="slider2" required class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-cyan-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Slider Image 3 URL</label>
                    <input type="url" id="slider3" required class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-cyan-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Notice Bar Message</label>
                    <textarea id="notice" rows="3" required class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-cyan-500 transition-colors resize-none"></textarea>
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-medium py-3 rounded-xl hover:opacity-90 active:scale-[0.99] transition-all shadow-[0_0_20px_rgba(6,182,212,0.3)] cursor-pointer">
                    <i class="fa-solid fa-floppy-disk mr-2"></i> Save Settings
                </button>
            </form>
        </section>

        <section class="bg-gray-900/40 border border-gray-800 rounded-2xl p-6 backdrop-blur-md shadow-xl flex flex-col justify-between">
            <div>
                <div class="flex items-center space-x-3 mb-6">
                    <i class="fa-solid fa-square-plus text-emerald-400 text-xl"></i>
                    <h2 class="text-lg font-medium text-white">Create New Menu</h2>
                </div>
                <form id="menuForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Menu Title</label>
                        <input type="text" id="menuTitle" placeholder="e.g., Live Chat" required class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-emerald-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Icon URL or Class</label>
                        <input type="text" id="menuIcon" placeholder="https://link-to-icon.png" required class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-emerald-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">AppCreator24 Ref (Section ID)</label>
                        <input type="text" id="menuRef" placeholder="e.g., section1" required class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-emerald-500 transition-colors">
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-medium py-3 rounded-xl hover:opacity-90 active:scale-[0.99] transition-all shadow-[0_0_20px_rgba(16,185,129,0.3)] cursor-pointer mt-4">
                        <i class="fa-solid fa-plus mr-2"></i> Add Menu Item
                    </button>
                </form>
            </div>
            
            <div class="mt-6 pt-6 border-t border-gray-800 text-center text-xs text-gray-500">
                Every action updates your Google Sheet configuration directly in real-time.
            </div>
        </section>
    </main>

    <script>
        // আপনার দেওয়া আসল লাইভ লিংক এখানে বসানো হয়েছে
        const API_URL = "https://script.google.com/macros/s/AKfycbw0231OHNhwXqi4ZeYq5s92RSaX3L9PnR6eaZuIab-MkewFy61tsOtwajMawussSQYV/exec"; 

        // Status Badge Handler
        function updateStatus(status, text) {
            const dot = document.getElementById('statusDot');
            const pulse = document.getElementById('statusDotPulse');
            const label = document.getElementById('statusText');
            
            if (status === 'online') {
                dot.className = "relative inline-flex rounded-full h-2 w-2 bg-emerald-500";
                pulse.className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75";
                label.className = "text-emerald-400 font-medium";
            } else if (status === 'error') {
                dot.className = "relative inline-flex rounded-full h-2 w-2 bg-rose-500";
                pulse.className = "absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-0";
                label.className = "text-rose-400 font-medium";
            } else if (status === 'connecting') {
                dot.className = "relative inline-flex rounded-full h-2 w-2 bg-yellow-500";
                pulse.className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75";
                label.className = "text-yellow-400 font-medium";
            }
            label.innerText = text;
        }

        // 1. LOAD CONFIGURATIONS (GET Request)
        async function loadSheetData() {
            try {
                updateStatus('connecting', 'Connecting Database...');
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Network error");
                const data = await response.json();
                
                if(data.settings) {
                    document.getElementById('slider1').value = data.settings.slider1 || '';
                    document.getElementById('slider2').value = data.settings.slider2 || '';
                    document.getElementById('slider3').value = data.settings.slider3 || '';
                    document.getElementById('notice').value = data.settings.notice || '';
                }
                updateStatus('online', '🟢 Live / Connected');
            } catch (error) {
                console.error("Load Error:", error);
                updateStatus('error', '🔴 CORS / Offline Error');
            }
        }

        // 2. SAVE SETTINGS (POST Request)
        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            updateStatus('connecting', 'Saving settings...');
            
            const payload = {
                action: 'updateSettings',
                slider1: document.getElementById('slider1').value,
                slider2: document.getElementById('slider2').value,
                slider3: document.getElementById('slider3').value,
                notice: document.getElementById('notice').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if(result.status === 'success') {
                    alert("Settings saved successfully on Google Sheets!");
                    loadSheetData();
                } else {
                    throw new Error("Failed saving");
                }
            } catch (error) {
                console.error("Save Settings Error:", error);
                alert("Error Saving Settings! Check your connection.");
                updateStatus('error', '🔴 CORS / Offline Error');
            }
        });

        // 3. CREATE MENU ITEM (POST Request)
        document.getElementById('menuForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            updateStatus('connecting', 'Adding menu item...');
            
            const payload = {
                action: 'addMenu',
                title: document.getElementById('menuTitle').value,
                icon: document.getElementById('menuIcon').value,
                ref: document.getElementById('menuRef').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if(result.status === 'success') {
                    alert("💥 Menu Item added successfully to Google Sheets!");
                    document.getElementById('menuForm').reset();
                    loadSheetData();
                } else {
                    throw new Error("Failed adding menu");
                }
            } catch (error) {
                console.error("Add Menu Error:", error);
                alert("❌ Error Adding Menu! Please check your Web App settings.");
                updateStatus('error', '🔴 CORS / Offline Error');
            }
        });

        // Initialize App Data on Window Load
        window.onload = loadSheetData;
    </script>
</body>
</html>
