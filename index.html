<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Camera</title>
    <!-- Tailwind CSS (স্টাইলিংয়ের জন্য) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- TensorFlow.js এবং COCO-SSD (AI অবজেক্ট ডিটেকশনের জন্য) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        /* লোডিং স্পিনারের জন্য কাস্টম অ্যানিমেশন */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #10B981;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between p-4 font-sans selection:bg-emerald-500 selection:text-white">

    <!-- হেডার সেকশন -->
    <header class="text-center py-4">
        <h1 class="text-2xl md:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-500">
            AI Smart Camera App
        </h1>
        <p class="text-slate-400 text-xs md:text-sm mt-1" id="status-text">ক্যামেরা চালু করা হচ্ছে...</p>
    </header>

    <!-- মেইন ক্যামেরা ভিউপোর্ট -->
    <main class="flex-grow flex flex-col items-center justify-center max-w-lg mx-auto w-full relative">
        
        <!-- ক্যামেরা এবং ক্যানভাস কন্টেইনার -->
        <div class="relative w-full aspect-[4/3] bg-black rounded-2xl overflow-hidden shadow-2xl border-4 border-slate-800">
            <!-- ভিডিও এলিমেন্ট (ক্যামেরার ফিড দেখাবে) -->
            <video id="webcam" autoplay playsinline muted class="absolute top-0 left-0 w-full h-full object-cover"></video>
            
            <!-- ক্যানভাস এলিমেন্ট (AI ডিটেকশন বক্স দেখানোর জন্য) -->
            <canvas id="canvas" class="absolute top-0 left-0 w-full h-full object-cover pointer-events-none"></canvas>

            <!-- AI মডেল লোডিং ওভারলে -->
            <div id="loading-overlay" class="absolute inset-0 bg-slate-900/90 flex flex-col items-center justify-center z-10 transition-opacity duration-500">
                <div class="spinner mb-4"></div>
                <p class="text-sm font-semibold text-emerald-400">AI মডেল লোড হচ্ছে...</p>
                <p class="text-xs text-slate-500 mt-1">প্রথমবার কিছুটা সময় লাগতে পারে</p>
            </div>
        </div>

        <!-- সনাক্তকৃত বস্তুর তালিকা -->
        <div class="w-full mt-4 bg-slate-800/50 backdrop-blur-md rounded-xl p-3 border border-slate-700/50 min-h-[50px] flex flex-wrap items-center justify-center gap-2">
            <span class="text-xs text-slate-400 w-full text-center block mb-1">সনাক্তকৃত বস্তুসমূহ:</span>
            <div id="detected-list" class="flex flex-wrap gap-2 justify-center w-full">
                <span class="text-xs text-slate-500">কোন বস্তু সনাক্ত হয়নি</span>
            </div>
        </div>

    </main>

    <!-- কন্ট্রোল বাটন সমূহ -->
    <footer class="max-w-lg mx-auto w-full py-4 mt-4 grid grid-cols-3 gap-2">
        
        <!-- ক্যামেরা পরিবর্তনের বাটন (সামনে/পেছনে) -->
        <button id="switch-cam-btn" class="bg-slate-800 hover:bg-slate-700 active:scale-95 text-white py-3 px-2 rounded-xl border border-slate-700 flex flex-col items-center justify-center gap-1 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 6H16" />
            </svg>
            <span class="text-[10px] font-semibold">ক্যামেরা বদল</span>
        </button>

        <!-- ছবি তোলার বাটন (AI বক্স সহ ছবি সেভ হবে) -->
        <button id="capture-btn" class="bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white py-3 px-2 rounded-xl flex flex-col items-center justify-center gap-1 transition-all shadow-lg shadow-emerald-900/30">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span class="text-[10px] font-semibold">ছবি তুলুন</span>
        </button>

        <!-- AI অন/অফ বাটন -->
        <button id="ai-toggle-btn" class="bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white py-3 px-2 rounded-xl flex flex-col items-center justify-center gap-1 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
            </svg>
            <span id="ai-btn-text" class="text-[10px] font-semibold">AI বন্ধ করুন</span>
        </button>

    </footer>

    <!-- স্ক্রিপ্ট সেকশন -->
    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status-text');
        const loadingOverlay = document.getElementById('loading-overlay');
        const detectedList = document.getElementById('detected-list');
        const switchCamBtn = document.getElementById('switch-cam-btn');
        const captureBtn = document.getElementById('capture-btn');
        const aiToggleBtn = document.getElementById('ai-toggle-btn');
        const aiBtnText = document.getElementById('ai-btn-text');

        let model = null;
        let currentFacingMode = 'environment'; // পেছনের ক্যামেরা ডিফোল্ট হিসেবে রাখা হয়েছে (মোবাইলের জন্য উপযোগী)
        let localStream = null;
        let isAiActive = true;
        let latestPredictions = [];
        let isDetecting = false;

        // ক্যামেরা চালু করার ফাংশন
        async function startWebcam() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: { facingMode: currentFacingMode },
                audio: false
            };

            try {
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = localStream;
                statusText.innerText = "ক্যামেরা প্রস্তুত। AI মডেল লোড হওয়া পর্যন্ত অপেক্ষা করুন...";
            } catch (err) {
                console.error("Camera access error:", err);
                statusText.innerText = "ক্যামেরা অ্যাক্সেস করা যায়নি। পারমিশন চেক করুন।";
                alert("ক্যামেরা ব্যবহারের অনুমতি প্রয়োজন। অনুগ্রহ করে ক্যামেরা পারমিশন চেক করুন।");
            }
        }

        // ক্যানভাসের সাইজ ভিডিওর সাথে সমন্বয় করা
        function adjustCanvasSize() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        }

        // AI মডেল লোড করার ফাংশن
        async function loadAIModel() {
            try {
                model = await cocoSsd.load();
                loadingOverlay.style.opacity = '0';
                setTimeout(() => loadingOverlay.style.display = 'none', 500);
                statusText.innerText = "AI ক্যামেরা চালু রয়েছে";
                detectionLoop();
            } catch (error) {
                console.error("Model load error:", error);
                statusText.innerText = "AI মডেল লোড করতে সমস্যা হয়েছে।";
                alert("AI মডেল ডাউনলোডে সমস্যা হয়েছে। ইন্টারনেট কানেকশন চেক করে আবার চেষ্টা করুন।");
            }
        }

        // AI ডিটেকশন লুপ
        async function detectionLoop() {
            if (!model || !isAiActive) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                setTimeout(detectionLoop, 200);
                return;
            }

            if (video.readyState === video.HAVE_ENOUGH_DATA && !isDetecting) {
                isDetecting = true;
                try {
                    const predictions = await model.detect(video);
                    latestPredictions = predictions; // গ্লোবাল ভেরিয়েবলে সংরক্ষণ (ছবি তোলার জন্য)

                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    updateDetectedList(predictions);

                    // ডিটেকশন বক্স ও লেবেল অঙ্কন করা
                    predictions.forEach(prediction => {
                        const [x, y, width, height] = prediction.bbox;

                        // বক্স আঁকা
                        ctx.strokeStyle = '#10B981';
                        ctx.lineWidth = 4;
                        ctx.strokeRect(x, y, width, height);

                        // লেবেলের ব্যাকগ্রাউন্ড
                        ctx.fillStyle = '#10B981';
                        ctx.font = 'bold 16px sans-serif';
                        const text = `${prediction.class} (${Math.round(prediction.score * 100)}%)`;
                        const textWidth = ctx.measureText(text).width;
                        ctx.fillRect(x, y - 26, textWidth + 14, 26);

                        // লেবেলের টেক্সট
                        ctx.fillStyle = '#FFFFFF';
                        ctx.fillText(text, x + 7, y - 8);
                    });
                } catch (e) {
                    console.error("Detection process error:", e);
                }
                isDetecting = false;
            }
            requestAnimationFrame(detectionLoop);
        }

        // UI-তে সনাক্তকৃত বস্তুর তালিকা আপডেট করা
        function updateDetectedList(predictions) {
            detectedList.innerHTML = '';
            if (predictions.length === 0) {
                detectedList.innerHTML = '<span class="text-xs text-slate-500">কোন বস্তু সনাক্ত হয়নি</span>';
                return;
            }
            predictions.forEach(p => {
                const name = p.class;
                const score = Math.round(p.score * 100);
                detectedList.innerHTML += `
                    <span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 px-3 py-1 rounded-full text-xs font-semibold">
                        ${name} (${score}%)
                    </span>
                `;
            });
        }

        // ক্যামেরা পরিবর্তন করার ইভেন্ট
        switchCamBtn.addEventListener('click', async () => {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            await startWebcam();
        });

        // AI অন/অফ করার ইভেন্ট
        aiToggleBtn.addEventListener('click', () => {
            isAiActive = !isAiActive;
            if (isAiActive) {
                aiBtnText.innerText = "AI বন্ধ করুন";
                aiToggleBtn.classList.replace('bg-slate-700', 'bg-emerald-600');
                statusText.innerText = "AI ক্যামেরা চালু রয়েছে";
            } else {
                aiBtnText.innerText = "AI চালু করুন";
                aiToggleBtn.classList.replace('bg-emerald-600', 'bg-slate-700');
                statusText.innerText = "সাধারণ ক্যামেরা চালু রয়েছে (AI বন্ধ)";
                detectedList.innerHTML = '<span class="text-xs text-slate-500">এআই বন্ধ রয়েছে</span>';
            }
        });

        // AI ওভারলে সহ ছবি তুলে ডাউনলোড করার ইভেন্ট
        captureBtn.addEventListener('click', () => {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            const tempCtx = tempCanvas.getContext('2d');

            // প্রথমে আসল ক্যামেরার ফ্রেম আঁকা
            tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);

            // AI অন থাকলে বক্সগুলো ছবির ওপরে আঁকা
            if (isAiActive && latestPredictions.length > 0) {
                latestPredictions.forEach(p => {
                    const [x, y, width, height] = p.bbox;
                    tempCtx.strokeStyle = '#10B981';
                    tempCtx.lineWidth = 4;
                    tempCtx.strokeRect(x, y, width, height);

                    tempCtx.fillStyle = '#10B981';
                    tempCtx.font = 'bold 16px sans-serif';
                    const text = `${p.class} (${Math.round(p.score * 100)}%)`;
                    const textWidth = tempCtx.measureText(text).width;
                    tempCtx.fillRect(x, y - 26, textWidth + 14, 26);

                    tempCtx.fillStyle = '#FFFFFF';
                    tempCtx.fillText(text, x + 7, y - 8);
                });
            }

            // ছবি হিসেবে ডাউনলোড করার প্রক্রিয়া
            const dataUrl = tempCanvas.toDataURL('image/png');
            const downloadLink = document.createElement('a');
            downloadLink.download = `AI-Snapshot-${Date.now()}.png`;
            downloadLink.href = dataUrl;
            downloadLink.click();
        });

        // ভিডিও স্টার্ট হলে ক্যানভাস সাইজ করা
        video.addEventListener('loadedmetadata', adjustCanvasSize);

        // অ্যাপ ইনিশিয়েট করা
        window.onload = async () => {
            await startWebcam();
            await loadAIModel();
        };
    </script>
</body>
</html>
