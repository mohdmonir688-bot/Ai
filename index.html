<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Reference Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col justify-between font-sans">

    <header class="p-5 border-b border-slate-800/80 bg-slate-900/50 backdrop-blur-md">
        <div class="max-w-md mx-auto flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-violet-600 to-cyan-400 flex items-center justify-center font-bold text-lg shadow-lg">AI</div>
            <div>
                <h1 class="text-md font-bold tracking-wide">MONIR ON WHEELS</h1>
                <p class="text-[10px] text-cyan-400 font-semibold tracking-widest uppercase">Official UI Test</p>
            </div>
        </div>
    </header>

    <main class="p-6 flex-1 flex flex-col justify-center max-w-md mx-auto w-full space-y-5">
        
        <div class="glass-card p-5 rounded-2xl text-center shadow-xl">
            <h2 class="text-lg font-bold text-slate-100 mb-1">Official Reference Test</h2>
            <p class="text-xs text-slate-400">নিচের বাটনে ক্লিক করলে অ্যাপ ক্রিয়েটরের সেকশন ওপেন হবে।</p>
        </div>

        <a href="go:1" class="block glass-card p-4 rounded-xl transition-all duration-300 hover:scale-[1.02] active:scale-95 bg-gradient-to-r hover:from-violet-900/30 hover:to-slate-800/50">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-lg bg-violet-600/20 border border-violet-500/30 flex items-center justify-center text-lg text-violet-400">💬</div>
                    <span class="font-bold text-slate-200">Open Camera Section</span>
                </div>
                <span class="text-violet-400">➔</span>
            </div>
        </a>

    </main>

    <footer class="w-full p-4 text-center text-[10px] text-slate-600 tracking-wider">
        POWERED BY GITHUB & APPCREATOR24
    </footer>

</body>
</html>
